apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: eventtriggers.guardian.cbad.io
spec:
  group: guardian.cbad.io
  scope: Namespaced
  names:
    kind: EventTrigger
    plural: eventtriggers
    singular: eventtrigger
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                targetPod:
                  type: string
                targetNamespace:
                  type: string
                eventType:
                  type: string
                priority:
                  type: string
                captureKernelTelemetry:
                  type: boolean
      subresources:
        status: {}
